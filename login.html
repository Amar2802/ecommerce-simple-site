<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - FashionWorld</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-container">
      <a class="brand auth-brand" href="index.html">FashionWorld</a>
      <h1>Welcome back</h1>
      <form id="login-form">
        <label>Username <input type="text" id="login-username" autocomplete="username" required /></label>
        <label>Password <input type="password" id="login-password" autocomplete="current-password" required /></label>
        <button type="submit">Login</button>
      </form>
      <p>Don't have an account? <a href="signup.html">Create one</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
