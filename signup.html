<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account - FashionWorld</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-container">
      <a class="brand auth-brand" href="index.html">FashionWorld</a>
      <h1>Create your account</h1>
      <form id="signup-form">
        <label>Username <input type="text" id="signup-username" autocomplete="username" required /></label>
        <label>Password <input type="password" id="signup-password" autocomplete="new-password" minlength="6" required /></label>
        <button type="submit">Sign up</button>
      </form>
      <p>Already have an account? <a href="login.html">Log in</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
