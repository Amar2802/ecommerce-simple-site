<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Cart - FashionWorld</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">FashionWorld</a>
    <nav>
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart (<span data-cart-count>0</span>)</a>
      <span id="auth-status"></span>
    </nav>
  </header>

  <main>
    <section class="page-title">
      <span class="eyebrow">Review your bag</span>
      <h1>Your Cart</h1>
      <p>Change quantities, remove items, and head to checkout when everything looks right.</p>
    </section>

    <section class="cart-layout">
      <div id="cart-items" aria-live="polite"></div>
      <aside class="summary-panel" id="cart-summary" aria-label="Cart summary"></aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
